<html lang="en">
<head>
<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* Body */
body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
line-height:1.6;
}

/* Header */
header{
background:#2c3e50;
color:white;
padding:15px 0;
}

/* Navigation */
nav{
display:flex;
justify-content:space-between;
align-items:center;
width:90%;
margin:auto;
}

.logo{
font-size:24px;
font-weight:bold;
text-decoration:none;
color:white;
}

.nav-links{
list-style:none;
display:flex;
}

.nav-links li{
margin-left:20px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:16px;
}

.nav-links a:hover{
color:#f39c12;
}

/* Hero Section */
.hero{
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");
background-size:cover;
background-position:center;
height:350px;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

/* Section */
section{
width:90%;
margin:auto;
padding:40px 0;
}

/* Form */
.form-container{
background:white;
max-width:450px;
margin:auto;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form-container h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input, select, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

/* Buttons */
.btn{
background:#27ae60;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:4px;
}

.btn:hover{
background:#219150;
}

.reset-btn{
background:#c0392b;
}

/* Footer */
footer{
background:#2c3e50;
color:white;
padding:30px 0;
margin-top:40px;
}

.footer-container{
width:90%;
margin:auto;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

.footer-box{
width:30%;
}

.footer-box h3{
margin-bottom:10px;
}

.footer-box a{
color:white;
text-decoration:none;
display:block;
margin-top:5px;
}

.footer-box a:hover{
color:#f39c12;
}

/* Responsive */
@media(max-width:768px){

.nav-links{
flex-direction:column;
}

.footer-container{
flex-direction:column;
}

.footer-box{
width:100%;
margin-bottom:20px;
}

}

</style>
